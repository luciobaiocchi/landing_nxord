<!doctype html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo-circle.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Preconnect fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Sans+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Base SEO (overridden per-page by react-helmet-async) -->
  <title>NxOrd – Ordini automatici e Sales Intelligence per distributori Ho.Re.Ca.</title>
  <meta name="description" content="NxOrd è la suite B2B che automatizza la ricezione ordini e potenzia il reparto sales dei distributori Ho.Re.Ca. con AI e Business Intelligence. Zero data entry." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://www.nxord.com/" />

  <!-- Open Graph base -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="NxOrd" />
  <meta property="og:title" content="NxOrd – Ordini automatici e Sales Intelligence per distributori Ho.Re.Ca." />
  <meta property="og:description" content="Automatizza la ricezione ordini e potenzia le vendite con AI e Business Intelligence." />
  <meta property="og:url" content="https://www.nxord.com/" />
  <meta property="og:image" content="https://www.nxord.com/og-image.png" />
  <meta property="og:locale" content="it_IT" />

  <!-- Twitter Card base -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="NxOrd – Suite B2B per distributori Ho.Re.Ca." />
  <meta name="twitter:description" content="Automatizza la ricezione ordini e potenzia le vendite con AI." />
  <meta name="twitter:image" content="https://www.nxord.com/og-image.png" />

  <!-- Structured Data: Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "NxOrd",
    "url": "https://www.nxord.com",
    "logo": "https://www.nxord.com/logo-circle.png",
    "description": "Suite B2B per distributori Ho.Re.Ca. che automatizza ordini e potenzia le vendite con AI e Business Intelligence.",
    "contactPoint": {
      "@type": "ContactPoint",
      "email": "thomaskellywork24@gmail.com",
      "contactType": "sales",
      "availableLanguage": ["Italian", "English"]
    },
    "sameAs": [
      "https://www.linkedin.com/company/nxord"
    ]
  }
  </script>

  <!-- Structured Data: SoftwareApplication -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "NxOrd",
    "applicationCategory": "BusinessApplication",
    "operatingSystem": "Web",
    "description": "Suite B2B per distributori Ho.Re.Ca.: automatizza la ricezione ordini da email, WhatsApp e PDF e potenzia il reparto sales con alert churn e upselling AI.",
    "offers": {
      "@type": "Offer",
      "priceCurrency": "EUR",
      "availability": "https://schema.org/InStock"
    },
    "publisher": {
      "@type": "Organization",
      "name": "NxOrd",
      "url": "https://www.nxord.com"
    }
  }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
